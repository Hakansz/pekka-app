<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekka-TV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 320px;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p  { color: #666; margin-bottom: 30px; }
        input[type=password] {
            width: 100%;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 8px;
            padding: 14px;
            border: 3px solid #ccc;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type=password]:focus { border-color: #4CAF50; }
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>📺 Pekka-TV</h1>
        <p>Ange PIN-kod</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="pin" maxlength="8"
                   placeholder="●●●●" autofocus autocomplete="off">
            <button type="submit">Logga in</button>
        </form>
    </div>
</body>
</html>
