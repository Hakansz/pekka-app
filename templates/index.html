<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekka-TV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; }
        .status-bar {
            background: #16213e;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 1rem;
        }
        .status-bar span { color: #aaa; }
        .status-bar b   { color: #fff; }
        .vpn-on  { color: #4CAF50 !important; }
        .vpn-off { color: #f44336 !important; }
        .countries {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .btn-country {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 14px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-country:hover  { background: #0f3460; border-color: #4CAF50; }
        .btn-country.active { background: #1b4332; border-color: #4CAF50; }
        .btn-country .flag  { font-size: 2rem; }
        .btn-country .name  { font-size: 0.9rem; font-weight: bold; margin-top: 6px; }
        .btn-country .app   { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
        .divider {
            grid-column: 1 / -1;
            border: none;
            border-top: 1px solid #0f3460;
            margin: 4px 0;
        }
        .spinner { display: none; text-align: center; padding: 20px; font-size: 1.2rem; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1.1rem;
            display: none;
            z-index: 999;
        }
        .toast.error { background: #f44336; }
        .logout {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .logout:hover { border-color: #f44336; color: #f44336; }
    </style>
</head>
<body>
    <header>
        <h1>📺 Pekka-TV</h1>
        <a href="/logout"><button class="logout">Logga ut</button></a>
    </header>

    <div class="status-bar">
        <div>
            VPN:
            <b id="vpn-status" class="{{ 'vpn-on' if status.vpn_status == 'running' else 'vpn-off' }}">
                {{ '🟢 På' if status.vpn_status == 'running' else '🔴 Av' }}
            </b>
        </div>
        <div><span>IP:</span> <b id="vpn-ip">{{ status.public_ip }}</b></div>
        <div><span>Land:</span> <b id="vpn-country">{{ status.country }}</b></div>
        <div><span>Stad:</span> <b id="vpn-city">{{ status.city }}</b></div>
    </div>

    <div class="countries" id="countries">
        <!-- Byggs av JS från countries.json -->
    </div>

    <div class="spinner" id="spinner">⏳ Byter VPN...</div>
    <div class="toast" id="toast"></div>

    <script>
        const FLAGS = {
            se:"🇸🇪", fi:"🇫🇮", dk:"🇩🇰", no:"🇳🇴", is:"🇮🇸",
            gb:"🇬🇧", ie:"🇮🇪", de:"🇩🇪", nl:"🇳🇱", fr:"🇫🇷",
            be:"🇧🇪", ch:"🇨🇭", at:"🇦🇹", ee:"🇪🇪", pl:"🇵🇱",
            pt:"🇵🇹", es:"🇪🇸", it:"🇮🇹", gr:"🇬🇷",
            us:"🇺🇸", ca:"🇨🇦", au:"🇦🇺", nz:"🇳🇿"
        };

        async function loadCountries() {
            const res  = await fetch('/countries.json');
            const list = await res.json();
            const grid = document.getElementById('countries');
            grid.innerHTML = '';
            list.forEach(c => {
                if (c.val === null) {
                    const hr = document.createElement('hr');
                    hr.className = 'divider';
                    grid.appendChild(hr);
                    return;
                }
                const div = document.createElement('div');
                div.className = 'btn-country';
                div.dataset.val = c.val;
                div.innerHTML = `
                    <div class="flag">${FLAGS[c.id] || '🌐'}</div>
                    <div class="name">${c.name}</div>
                    <div class="app">${c.app}</div>`;
                div.onclick = () => selectCountry(c.val, div);
                grid.appendChild(div);
            });
        }

        async function selectCountry(val, el) {
            document.getElementById('spinner').style.display = 'block';
            document.querySelectorAll('.btn-country').forEach(b => b.classList.remove('active'));
            try {
                const r = await fetch(`/api/select/auto/${val}`, {method:'POST'});
                const d = await r.json();
                if (d.status === 'ok') {
                    el.classList.add('active');
                    showToast(`✅ ${el.querySelector('.name').textContent}`);
                    refreshStatus();
                } else {
                    showToast('❌ Fel: ' + (d.message || 'okänt'), true);
                }
            } catch(e) {
                showToast('❌ Kunde inte nå servern', true);
            }
            document.getElementById('spinner').style.display = 'none';
        }

        async function refreshStatus() {
            const r = await fetch('/api/status');
            const d = await r.json();
            document.getElementById('vpn-status').textContent  = d.vpn_status === 'running' ? '🟢 På' : '🔴 Av';
            document.getElementById('vpn-status').className    = d.vpn_status === 'running' ? 'vpn-on' : 'vpn-off';
            document.getElementById('vpn-ip').textContent      = d.public_ip;
            document.getElementById('vpn-country').textContent = d.country;
            document.getElementById('vpn-city').textContent    = d.city;
        }

        function showToast(msg, error=false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className   = 'toast' + (error ? ' error' : '');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        loadCountries();
        setInterval(refreshStatus, 30000);
    </script>
</body>
</html>
