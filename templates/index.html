<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekka-TV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }
        header {
            text-align: center;
            margin-bottom: 16px;
        }
        h1 { font-size: 1.8rem; }
        .status-bar {
            background: #16213e;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 1rem;
        }
        .status-bar span { color: #aaa; }
        .status-bar b { color: #fff; }
        .vpn-on  { color: #4CAF50 !important; }
        .vpn-off { color: #f44336 !important; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .btn {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 14px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            width: 100%;
        }
        .btn:hover { background: #0f3460; border-color: #4CAF50; }
        .btn .flag { font-size: 2.6rem; }
        .btn .name { font-size: 0.95rem; font-weight: bold; margin-top: 8px; }
        .btn .app  { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
        .btn-util .icon { font-size: 2rem; }
        .btn-util .name { font-size: 0.95rem; font-weight: bold; margin-top: 8px; }
        .divider {
            grid-column: 1 / -1;
            border: none;
            border-top: 1px solid #0f3460;
            margin: 4px 0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1.1rem;
            display: none;
            z-index: 999;
        }
        .toast.error { background: #f44336; }
        .spinner {
            display: none;
            text-align: center;
            padding: 16px;
            font-size: 1.1rem;
        }
        .qr-wrap {
            text-align: center;
            margin-top: 28px;
            padding-bottom: 20px;
        }
        .qr-wrap img {
            width: 140px;
            border-radius: 12px;
            background: #fff;
            padding: 6px;
        }
        .qr-wrap small { display: block; color: #aaa; margin-top: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header><h1>📺 Pekka-TV</h1></header>

    <div class="status-bar">
        <div>VPN: <b id="vpn-status" class="{{ 'vpn-on' if status.vpn_status == 'running' else 'vpn-off' }}">{{ '🟢 På' if status.vpn_status == 'running' else '🔴 Av' }}</b></div>
        <div><span>IP:</span> <b id="vpn-ip">{{ status.public_ip }}</b></div>
        <div><span>Land:</span> <b id="vpn-country">{{ status.country }}</b></div>
        <div><span>Stad:</span> <b id="vpn-city">{{ status.city }}</b></div>
    </div>

    <div class="grid" id="grid">
        <a href="/help" class="btn btn-util" style="text-decoration:none;color:#fff;">
            <div class="icon">❓</div>
            <div class="name">Info</div>
        </a>
        <a href="/debug" class="btn btn-util" style="text-decoration:none;color:#fff;">
            <div class="icon">🔧</div>
            <div class="name">Rapport</div>
        </a>
    </div>

    <div class="spinner" id="spinner">⏳ Byter VPN...</div>
    <div class="toast" id="toast"></div>

    <div class="qr-wrap">
        <img src="/static/qr.png" alt="QR-kod">
        <small>Dela länk</small>
    </div>

    <script>
        const FLAGS = {
            se:"🇸🇪", fi:"🇫🇮", dk:"🇩🇰", no:"🇳🇴",
            gb:"🇬🇧", de:"🇩🇪", fr:"🇫🇷", nl:"🇳🇱",
            it:"🇮🇹", es:"🇪🇸", ca:"🇨🇦", au:"🇦🇺"
        };

        async function loadCountries() {
            const res  = await fetch('/countries.json');
            const list = await res.json();
            const grid = document.getElementById('grid');
            list.forEach(c => {
                if (c.val === null) {
                    const hr = document.createElement('hr');
                    hr.className = 'divider';
                    grid.appendChild(hr);
                    return;
                }
                const div = document.createElement('div');
                div.className = 'btn';
                div.innerHTML = `
                    <div class="flag">${FLAGS[c.id] || '🌐'}</div>
                    <div class="name">${c.name}</div>
                    <div class="app">${c.app}</div>`;
                div.onclick = () => selectCountry(c.val, div);
                grid.appendChild(div);
            });
        }

        async function selectCountry(val, el) {
            document.getElementById('spinner').style.display = 'block';
            try {
                const r = await fetch(`/api/select/${val}`, {method:'POST'});
                const d = await r.json();
                if (d.status === 'ok') {
                    showToast('✅ ' + el.querySelector('.name').textContent);
                    refreshStatus();
                } else {
                    showToast('❌ ' + (d.message || 'Okänt fel'), true);
                }
            } catch(e) {
                showToast('❌ Kunde inte nå servern', true);
            }
            document.getElementById('spinner').style.display = 'none';
        }

        async function refreshStatus() {
            const r = await fetch('/api/status');
            const d = await r.json();
            document.getElementById('vpn-status').textContent  = d.vpn_status === 'running' ? '🟢 På' : '🔴 Av';
            document.getElementById('vpn-status').className    = d.vpn_status === 'running' ? 'vpn-on' : 'vpn-off';
            document.getElementById('vpn-ip').textContent      = d.public_ip;
            document.getElementById('vpn-country').textContent = d.country;
            document.getElementById('vpn-city').textContent    = d.city;
        }

        function showToast(msg, error=false) {
            const t = document.getElementById('toast');
            t.textContent   = msg;
            t.className     = 'toast' + (error ? ' error' : '');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Logga ut kl 04:00
        function scheduleLogout() {
            const now  = new Date();
            const next = new Date();
            next.setHours(4, 0, 0, 0);
            if (next <= now) next.setDate(next.getDate() + 1);
            setTimeout(() => { window.location.href = '/logout'; }, next - now);
        }

        loadCountries();
        refreshStatus();
        setInterval(refreshStatus, 30000);
        scheduleLogout();
    </script>
</body>
</html>
